<style>
:root {
    --bg-main: #050505;
    --gold-main: #d4af37;
    --gold-bright: #f9d763;
    --gold-dim: #8a7122;
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

body {
    background-color: var(--bg-main);
    color: #ffffff;
    font-family: 'Roboto', sans-serif;
    overflow-x: hidden;
}

/* --- OVERLAYS --- */
.noise-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50;
    opacity: 0.05; background: url('https://grainy-gradients.vercel.app/noise.svg');
}

/* --- MAP STYLES --- */
.map-section {
    padding-top: 50px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
}
.map-container {
    position: relative; width: 95%; max-width: 1600px;
    border: 1px solid var(--gold-dim);
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    overflow: hidden; 
    cursor: grab;
}
.map-wrapper-inner { position: relative; width: 100%; }

#master-map-img {
    width: 100%; height: auto; display: block; user-select: none;
    filter: sepia(0.2) contrast(1.1) brightness(0.8);
}

#plots-svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
}

/* --- 🌟 THE NEW ANIMATION MAGIC 🌟 --- */

/* 1. Base State (Invisible) */
.plot-poly {
    fill: transparent;
    stroke: transparent;
    stroke-width: 1px;
    transition: stroke 0.3s, filter 0.3s;
    cursor: pointer;
    vector-effect: non-scaling-stroke;
}

/* 2. Hover State (Trigger Animation) */
.plot-poly:hover {
    /* Connects to the SVG Linear Gradient defined below */
    fill: url(#gold-scan-gradient); 
    
    stroke: var(--gold-bright);
    stroke-width: 3px;
    
    /* Neon Glow Effect */
    filter: drop-shadow(0 0 10px var(--gold-main));
    
    /* Pulse Animation on the Border */
    animation: borderPulse 2s infinite alternate;
}

@keyframes borderPulse {
    0% { stroke-opacity: 1; stroke-width: 2px; }
    100% { stroke-opacity: 0.5; stroke-width: 4px; }
}

/* --- INFO CARD --- */
#info-card {
    position: fixed; pointer-events: none; z-index: 1000;
    width: 300px; background: rgba(10, 10, 10, 0.95);
    border: 1px solid var(--gold-main); padding: 20px;
    opacity: 0; transform: translateY(20px); transition: 0.2s;
    backdrop-filter: blur(10px);
}
#info-card.active { opacity: 1; transform: translateY(0); }
.info-title { font-family: 'Rajdhani'; font-size: 24px; color: var(--gold-main); font-weight: 700; display: block; margin-bottom: 10px;}
.info-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #ccc; }
.info-val { color: white; font-weight: bold; }

/* --- BUILDER TOOLS --- */
#builder-controls {
    display: block; position: fixed; bottom: 20px; left: 20px; z-index: 9999;
    background: #222; padding: 15px; border: 1px solid var(--gold-main); color: white; width: 300px;
}
.builder-btn { 
    background: var(--gold-main); color: #000; border: none; padding: 8px; 
    cursor: pointer; margin-top: 5px; font-weight: bold; width: 100%; 
}
.magic-btn { background: #8a2be2; color: white; }

    const svg = document.getElementById('plots-svg');
    const infoCard = document.getElementById('info-card');
    
    img.onload = function() {
        const w = img.naturalWidth;
        const h = img.naturalHeight;
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    };

    // --- TOOLTIP ---
    const polys = document.querySelectorAll('.plot-poly');
    polys.forEach(poly => {
        poly.addEventListener('mouseenter', (e) => {
            const upi = poly.getAttribute('data-upi');
            const data = plotsDB[upi];
            if (data) {
                document.getElementById('card-upi').textContent = `УПИ ${upi}`;
                document.getElementById('card-area').textContent = data.area + ' m²';
                document.getElementById('card-type').textContent = data.type;
                document.getElementById('card-rzp').textContent = data.rzp + ' m²';
                infoCard.classList.add('active');
            }
        });
        poly.addEventListener('mousemove', (e) => {
            const x = e.clientX + 20;
            const y = e.clientY + 20;
            infoCard.style.left = `${x}px`;
            infoCard.style.top = `${y}px`;
        });
        poly.addEventListener('mouseleave', () => {
            infoCard.classList.remove('active');
        });
    });

    // --- BUILDER MODE ---
    const BUILDER_MODE = true; 

    if (BUILDER_MODE) {
        document.getElementById('builder-controls').style.display = 'block';
        
        const plotKeys = Object.keys(plotsDB);
        let currentIndex = 43; 
        
        let currentPoints = [];
        let tempDots = []; 
        let allGeneratedCode = ""; 

        function updateBuilderUI() {
            const nextUPI = plotKeys[currentIndex];
            if(!nextUPI) {
                document.getElementById('builder-info').innerHTML = "<b>ALL DONE! 🎉</b>";
                return;
            }
            document.getElementById('builder-info').innerHTML = 
                `MAPPING: <b style="color: yellow; font-size: 18px;">${nextUPI}</b><br>Points: ${currentPoints.length}`;
        }
        
        updateBuilderUI();

        svg.addEventListener('click', (e) => {
            if (!plotKeys[currentIndex]) return;
            const rect = svg.getBoundingClientRect();
            const scaleX = img.naturalWidth / rect.width;
            const scaleY = img.naturalHeight / rect.height;
            const relX = (e.clientX - rect.left) * scaleX;
            const relY = (e.clientY - rect.top) * scaleY;
            
            const pt = `${Math.round(relX)},${Math.round(relY)}`;
            currentPoints.push(pt);
            
            const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("cx", relX);
            dot.setAttribute("cy", relY);
            dot.setAttribute("r", 5);
            dot.setAttribute("fill", "#00ff00");
            dot.setAttribute("stroke", "black");
            svg.appendChild(dot);
            tempDots.push(dot);

            updateBuilderUI();
        });

        window.magicFixLast = function() {
            if(currentPoints.length !== 4) { alert("Magic Fix only works on 4-sided rectangles! 🛑"); return; }
            let xs = currentPoints.map(p => parseInt(p.split(',')[0]));
            let ys = currentPoints.map(p => parseInt(p.split(',')[1]));
            let minX = Math.min(...xs), maxX = Math.max(...xs);
            let minY = Math.min(...ys), maxY = Math.max(...ys);
            
            // Reorder to generic TL, TR, BR, BL order isn't guaranteed but box is fixed
            const fixedPoints = [`${minX},${minY}`, `${maxX},${minY}`, `${maxX},${maxY}`, `${minX},${maxY}`];
            currentPoints = fixedPoints;
            
            tempDots.forEach(dot => dot.remove());
            tempDots = [];
            fixedPoints.forEach(pt => {
                const coords = pt.split(',');
                const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                dot.setAttribute("cx", coords[0]); dot.setAttribute("cy", coords[1]);
                dot.setAttribute("r", 5); dot.setAttribute("fill", "#8a2be2"); dot.setAttribute("stroke", "white");
                svg.appendChild(dot);
                tempDots.push(dot);
            });
            const status = document.getElementById('status-msg');
            status.textContent = `SHAPE STRAIGHTENED! ✨`; status.style.color = "#a55eea";
        };

        window.undoLastPoint = function() {
            if(currentPoints.length > 0) {
                currentPoints.pop();
                const lastDot = tempDots.pop();
                if(lastDot) lastDot.remove();
                updateBuilderUI();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === 'Enter') {
                e.preventDefault(); 
                if (currentPoints.length < 3) return;
                const currentUPI = plotKeys[currentIndex];
                const pointsString = currentPoints.join(' ');
                const newPolyTag = `<polygon class="plot-poly" data-upi="${currentUPI}" points="${pointsString}"></polygon>`;
                allGeneratedCode += newPolyTag + "\n";
                navigator.clipboard.writeText(newPolyTag).then(() => {
                    const status = document.getElementById('status-msg');
                    status.textContent = `COPIED ${currentUPI}! ✅`; status.style.color = "#00ff00";
                    setTimeout(() => status.textContent = "", 2000);
                });
                console.log(newPolyTag);
                tempDots.forEach(dot => dot.remove());
                tempDots = [];
                currentPoints = [];
                currentIndex++;
                updateBuilderUI();
            }
        });

        window.copyAllGenerated = function() {
            if (!allGeneratedCode) { alert("Map something first!"); return; }
            navigator.clipboard.writeText(allGeneratedCode).then(() => {
                alert("COPIED ALL POLYGONS! \nNow paste them inside <svg>.");
            });
        }
    }
</script>
</body>
</html>
